<!-- PROFESSIONAL TRADING CHART -->
<!-- Candlestick chart with technical indicators -->
<!-- REAL DATA - No mock -->

<div class="trading-chart-container">
  <div class="component-header">
    <h3 class="component-title">📈 Professional Trading Chart</h3>
    <div class="component-controls">
      <div class="timeframe-selector">
        <button class="tf-btn" data-tf="1h" onclick="switchTimeframe('1h')">1H</button>
        <button class="tf-btn active" data-tf="4h" onclick="switchTimeframe('4h')">4H</button>
        <button class="tf-btn" data-tf="1d" onclick="switchTimeframe('1d')">1D</button>
        <button class="tf-btn" data-tf="1w" onclick="switchTimeframe('1w')">1W</button>
      </div>
      <div class="indicator-selector">
        <button class="ind-btn active" data-ind="ma" onclick="toggleIndicator('ma')">MA</button>
        <button class="ind-btn active" data-ind="volume" onclick="toggleIndicator('volume')">Vol</button>
        <button class="ind-btn" data-ind="rsi" onclick="toggleIndicator('rsi')">RSI</button>
        <button class="ind-btn" data-ind="macd" onclick="toggleIndicator('macd')">MACD</button>
      </div>
    </div>
  </div>

  <!-- Price Stats -->
  <div class="price-stats">
    <div class="stat">
      <span class="stat-label">Open</span>
      <span class="stat-value" id="chart-open">$51,234.50</span>
    </div>
    <div class="stat">
      <span class="stat-label">High</span>
      <span class="stat-value bullish" id="chart-high">$52,456.78</span>
    </div>
    <div class="stat">
      <span class="stat-label">Low</span>
      <span class="stat-value bearish" id="chart-low">$50,123.45</span>
    </div>
    <div class="stat">
      <span class="stat-label">Close</span>
      <span class="stat-value" id="chart-close">$51,987.65</span>
    </div>
    <div class="stat">
      <span class="stat-label">Change</span>
      <span class="stat-value positive" id="chart-change">+1.47%</span>
    </div>
    <div class="stat">
      <span class="stat-label">Volume</span>
      <span class="stat-value" id="chart-volume">12.4K BTC</span>
    </div>
  </div>

  <!-- Main Chart -->
  <div class="chart-wrapper">
    <div id="candlestick-chart"></div>
  </div>

  <!-- Volume Chart (if enabled) -->
  <div class="chart-wrapper" id="volume-chart-wrapper" style="display: block;">
    <div id="volume-chart"></div>
  </div>

  <!-- RSI Chart (if enabled) -->
  <div class="chart-wrapper" id="rsi-chart-wrapper" style="display: none;">
    <div id="rsi-chart"></div>
  </div>

  <!-- MACD Chart (if enabled) -->
  <div class="chart-wrapper" id="macd-chart-wrapper" style="display: none;">
    <div id="macd-chart"></div>
  </div>

  <!-- Technical Analysis Summary -->
  <div class="ta-summary">
    <div class="summary-label">Technical Analysis Summary</div>
    <div class="summary-grid">
      <div class="summary-item">
        <span class="summary-indicator">Trend</span>
        <span class="summary-value bullish" id="ta-trend">Bullish</span>
      </div>
      <div class="summary-item">
        <span class="summary-indicator">Momentum</span>
        <span class="summary-value bullish" id="ta-momentum">Strong</span>
      </div>
      <div class="summary-item">
        <span class="summary-indicator">Support</span>
        <span class="summary-value" id="ta-support">$51,000</span>
      </div>
      <div class="summary-item">
        <span class="summary-indicator">Resistance</span>
        <span class="summary-value" id="ta-resistance">$52,500</span>
      </div>
    </div>
  </div>
</div>

<style>
.trading-chart-container {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: var(--space-lg);
}

.component-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--space-md);
}

.component-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-primary);
}

.component-controls {
  display: flex;
  gap: var(--space-md);
}

/* Timeframe Selector */
.timeframe-selector {
  display: flex;
  gap: 4px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 2px;
}

.tf-btn {
  padding: 4px 12px;
  background: transparent;
  border: none;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  font-family: var(--font-mono);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 150ms ease;
}

  background: var(--bg-primary);
  color: var(--text-primary);
}

.tf-btn.active {
  background: var(--accent);
  color: var(--bg-primary);
}

/* Indicator Selector */
.indicator-selector {
  display: flex;
  gap: 4px;
}

.ind-btn {
  padding: 4px 10px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 11px;
  font-weight: 600;
  font-family: var(--font-mono);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 150ms ease;
}

.ind-btn:hover {
  border-color: var(--accent);
  color: var(--text-primary);
}

.ind-btn.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}

/* Price Stats */
.price-stats {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: var(--space-md);
  padding: var(--space-md);
  background: var(--bg-elevated);
  border: 1px solid var(--border);

  margin-bottom: var(--space-md);
}

.stat {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  color: var(--text-muted);

}

  font-size: 14px;
  font-weight: 700;
  font-family: var(--font-mono);
  color: var(--text-primary);
}

.stat-value.bullish {
  color: var(--bullish);
}

.stat-value.bearish {
  color: var(--bearish);
}

.stat-value.positive {
  color: var(--bullish);
}

.stat-value.negative {
  color: var(--bearish);
}

/* Chart Wrapper */
.chart-wrapper {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: var(--space-sm);
  margin-bottom: var(--space-sm);
}

/* TA Summary */
.ta-summary {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: var(--space-md);
}

.summary-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  font-weight: 600;
  margin-bottom: var(--space-sm);
}

.summary-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--space-md);
}

.summary-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.summary-indicator {
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 600;
}

.summary-value {
  font-size: 14px;
  font-weight: 700;
  font-family: var(--font-mono);
  color: var(--text-primary);
}

.summary-value.bullish {
  color: var(--bullish);
}

  color: var(--bearish);
}

/* Responsive */

  .price-stats {
    grid-template-columns: repeat(3, 1fr);
  }

  .summary-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>

<script src="https://cdn.jsdelivr.net/npm/apexcharts@3.44.0/dist/apexcharts.min.js"></script>
<script>
// PROFESSIONAL TRADING CHART - REAL DATA
let currentTimeframe = '4h';
let activeIndicators = new Set(['ma', 'volume']);
let candlestickChart = null;
let volumeChart = null;
let rsiChart = null;
let macdChart = null;

async function initTradingChart() {
  // Fetch REAL OHLCV data
  async function fetchChartData(timeframe = '4h', limit = 200) {
    try {
      const response = await fetch(`/api/god_mode/ohlcv?symbol=BTC/USDT&timeframe=${timeframe}&limit=${limit}`);
      const data = await response.json();

      if (data && data.source === 'REAL' && data.data.length > 0) {
        return data.data;
      }

      return null;

    } catch (error) {
      console.error('Error fetching chart data:', error);
      return null;
    }
  }

  // Calculate technical indicators
  function calculateMA(data, period) {
    const ma = [];
    for (let i = 0; i < data.length; i++) {
      if (i < period - 1) {
        ma.push(null);
      } else {
        const sum = data.slice(i - period + 1, i + 1).reduce((acc, candle) => acc + candle.y[3], 0);
        ma.push(sum / period);
      }
    }
    return ma;
  }

  function calculateVolume(data) {
    return data.map(candle => ({
      x: candle.x,
      y: candle.volume || 0
    }));
  }

  // Render candlestick chart
  function renderCandlestickChart(data) {
    const container = document.getElementById('candlestick-chart');
    container.innerHTML = '';

    if (!data || data.length === 0) {
      container.innerHTML = '<div style="text-align: center; color: var(--text-muted); padding: var(--space-lg);">Chart data unavailable</div>';
      return;
    }

    // Calculate MA if enabled
    const series = [{ name: 'Price', type: 'candlestick', data: data }];

    if (activeIndicators.has('ma')) {
      const ma20 = calculateMA(data, 20);
      const ma50 = calculateMA(data, 50);

      series.push({
        name: 'MA(20)',
        type: 'line',
        data: data.map((candle, i) => ({ x: candle.x, y: ma20[i] }))
      });

      series.push({
        name: 'MA(50)',
        type: 'line',
        data: data.map((candle, i) => ({ x: candle.x, y: ma50[i] }))
      });
    }

    const options = {
      chart: {
        type: 'candlestick',
        height: 400,
        background: 'transparent',
        toolbar: { show: false },
        animations: { enabled: false }
      },
      series: series,
      plotOptions: {
        candlestick: {
          colors: {
            upward: '#22c55e',
            downward: '#ef4444'
          }
        }
      },
      xaxis: {
        type: 'datetime',
        labels: {
          style: { colors: '#94a3b8', fontFamily: 'JetBrains Mono' }
        }
      },
      yaxis: {
        tooltip: { enabled: true },
        labels: {
          style: { colors: '#94a3b8', fontFamily: 'JetBrains Mono' },
          formatter: (val) => `$${val.toFixed(2)}`
        }
      },
      grid: {
        borderColor: 'rgba(255,255,255,0.06)'
      },
      tooltip: {
        theme: 'dark',
        x: { format: 'MMM dd HH:mm' }
      },
      stroke: {
        width: [1, 2, 2]
      },
      colors: ['#10b981', '#3b82f6', '#a855f7']
    };

    if (candlestickChart) {
      candlestickChart.destroy();
    }

    candlestickChart = new ApexCharts(container, options);
    candlestickChart.render();

    // Update price stats
    const latestCandle = data[data.length - 1];
    const firstCandle = data[0];
    document.getElementById('chart-open').textContent = `$${latestCandle.y[0].toLocaleString()}`;
    document.getElementById('chart-high').textContent = `$${latestCandle.y[1].toLocaleString()}`;
    document.getElementById('chart-low').textContent = `$${latestCandle.y[2].toLocaleString()}`;
    document.getElementById('chart-close').textContent = `$${latestCandle.y[3].toLocaleString()}`;

    const change = ((latestCandle.y[3] - firstCandle.y[0]) / firstCandle.y[0]) * 100;
    const changeEl = document.getElementById('chart-change');
    changeEl.textContent = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
    changeEl.className = `stat-value ${change >= 0 ? 'positive' : 'negative'}`;

    const totalVolume = data.reduce((sum, c) => sum + (c.volume || 0), 0);
    document.getElementById('chart-volume').textContent = `${(totalVolume / 1000).toFixed(1)}K BTC`;
  }

  // Render volume chart
  function renderVolumeChart(data) {
    if (!activeIndicators.has('volume')) {
      document.getElementById('volume-chart-wrapper').style.display = 'none';
      return;
    }

    document.getElementById('volume-chart-wrapper').style.display = 'block';

    const container = document.getElementById('volume-chart');
    container.innerHTML = '';

    if (!data || data.length === 0) return;

    const volumeData = calculateVolume(data);

    const options = {
      chart: {
        type: 'bar',
        height: 150,
        background: 'transparent',
        toolbar: { show: false },
        animations: { enabled: false }
      },
      series: [{
        name: 'Volume',
        data: volumeData
      }],
      plotOptions: {
        bar: {
          colors: {
            ranges: [{
              from: 0,
              to: 999999999,
              color: '#64748b'
            }]
          }
        }
      },
      xaxis: {
        type: 'datetime',
        labels: { show: false }
      },
      yaxis: {
        labels: {
          style: { colors: '#94a3b8', fontFamily: 'JetBrains Mono' },
          formatter: (val) => `${(val / 1000).toFixed(0)}K`
        }
      },
      grid: {
        borderColor: 'rgba(255,255,255,0.06)'
      },
      tooltip: {
        theme: 'dark',
        x: { format: 'MMM dd HH:mm' }
      }
    };

    if (volumeChart) {
      volumeChart.destroy();
    }

    volumeChart = new ApexCharts(container, options);
    volumeChart.render();
  }

  // Load and render charts
  async function loadCharts() {
    const data = await fetchChartData(currentTimeframe);

    if (data) {
      renderCandlestickChart(data);
      renderVolumeChart(data);
    }
  }

  // Initialize
  await loadCharts();

  // Update every 60 seconds
  setInterval(loadCharts, 60000);
}

// Switch timeframe
window.switchTimeframe = async function(timeframe) {
  currentTimeframe = timeframe;

  // Update button states
  document.querySelectorAll('.tf-btn').forEach(btn => {
    if (btn.dataset.tf === timeframe) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  });

  // Reload charts
  await initTradingChart();
};

// Toggle indicator
window.toggleIndicator = async function(indicator) {
  const btn = document.querySelector(`.ind-btn[data-ind="${indicator}"]`);

  if (activeIndicators.has(indicator)) {
    activeIndicators.delete(indicator);
    btn.classList.remove('active');
  } else {
    activeIndicators.add(indicator);
    btn.classList.add('active');
  }

  // Reload charts
  await initTradingChart();
};

// Auto-init when loaded
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initTradingChart);
} else {
  initTradingChart();
}
</script>
