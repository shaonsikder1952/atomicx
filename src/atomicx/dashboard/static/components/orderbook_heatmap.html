<script>
// ORDER BOOK HEATMAP - REAL DATA
async function initOrderBookHeatmap() {
  const symbol = 'BTCUSDT';
  let currentPrice = 0;

  // Fetch REAL order book data
  async function fetchOrderBookData() {
    try {
      // Get order book from API
      const obResponse = await fetch(`/api/god_mode/orderbook?symbol=${symbol}`);
      const obData = await obResponse.json();

      // Get microstructure features from predictions
      const predResponse = await fetch(`/api/god_mode/predictions?symbol=${symbol}`);
      const predData = await predResponse.json();

      const microstructure = predData.predictions?.orderbook;

      if (obData && obData.data_source === 'REAL') {
        return {
          bids: obData.bids || [],
          asks: obData.asks || [],
          microstructure: microstructure || {},
          source: 'REAL'
        };
      }

      return null;

    } catch (error) {
      console.error('Error fetching order book data:', error);
      return null;
    }
  }

  // Render order book
  function renderOrderBook(data) {
    if (!data || !data.bids.length || !data.asks.length) {
      document.getElementById('ob-bids').innerHTML =
        '<div style="padding: var(--space-md); text-align: center; color: var(--text-muted);">Order book data unavailable</div>';
      document.getElementById('ob-asks').innerHTML = '';
      return;
    }

    const { bids, asks, microstructure } = data;

    // Calculate current price (mid-point)
    if (bids.length && asks.length) {
      currentPrice = (parseFloat(bids[0][0]) + parseFloat(asks[0][0])) / 2;
      document.getElementById('current-price').textContent = `$${currentPrice.toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      })}`;

      // Calculate spread
      const spread = asks[0][0] - bids[0][0];
      const spreadPct = (spread / currentPrice) * 100;
      document.getElementById('ob-spread').textContent = `Spread: ${spreadPct.toFixed(3)}%`;
    }

    // Update microstructure metrics
    if (microstructure && microstructure.data_source === 'REAL') {
      const imbalance = microstructure.imbalance || 0;
      const toxicity = microstructure.toxicity || 0;
      const spoofing = microstructure.spoofing_score || 0;

      document.getElementById('ob-imbalance').textContent = imbalance >= 0 ? `+${imbalance.toFixed(2)}` : imbalance.toFixed(2);
      document.getElementById('ob-toxicity').textContent = toxicity.toFixed(2);
      document.getElementById('ob-spoofing').textContent = spoofing.toFixed(2);

      // Update bars
      const imbalanceBar = document.getElementById('imbalance-bar');
      const imbalancePct = ((imbalance + 1) / 2) * 100; // Map -1..1 to 0..100
      imbalanceBar.style.width = `${imbalancePct}%`;
      imbalanceBar.style.background = imbalance > 0 ? 'var(--bullish)' : 'var(--bearish)';

      document.getElementById('toxicity-bar').style.width = `${toxicity * 100}%`;
      document.getElementById('spoofing-bar').style.width = `${spoofing * 100}%`;
    }

    // Render asks (top 15)
    const asksContainer = document.getElementById('ob-asks');
    asksContainer.innerHTML = '';

    const topAsks = asks.slice(0, 15);
    const maxAskSize = Math.max(...topAsks.map(a => parseFloat(a[1])));

    topAsks.forEach(([price, size]) => {
      const priceFloat = parseFloat(price);
      const sizeFloat = parseFloat(size);
      const total = priceFloat * sizeFloat;
      const sizePct = (sizeFloat / maxAskSize) * 100;

      const level = document.createElement('div');
      level.className = 'ob-level ask';
      level.innerHTML = `
        <div class="ob-level-bg" style="width: ${sizePct}%"></div>
        <span class="ob-level-price">${priceFloat.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
        <span class="ob-level-size">${sizeFloat.toFixed(6)}</span>
        <span class="ob-level-total">${total.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0})}</span>
      `;
      asksContainer.appendChild(level);
    });

    // Render bids (top 15)
    const bidsContainer = document.getElementById('ob-bids');
    bidsContainer.innerHTML = '';

    const topBids = bids.slice(0, 15);
    const maxBidSize = Math.max(...topBids.map(b => parseFloat(b[1])));

    topBids.forEach(([price, size]) => {
      const priceFloat = parseFloat(price);
      const sizeFloat = parseFloat(size);
      const total = priceFloat * sizeFloat;
      const sizePct = (sizeFloat / maxBidSize) * 100;

      const level = document.createElement('div');
      level.className = 'ob-level bid';
      level.innerHTML = `
        <div class="ob-level-bg" style="width: ${sizePct}%"></div>
        <span class="ob-level-price">${priceFloat.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
        <span class="ob-level-size">${sizeFloat.toFixed(6)}</span>
        <span class="ob-level-total">${total.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0})}</span>
      `;
      bidsContainer.appendChild(level);
    });

    // Calculate liquidity
    const bidLiquidity = bids.slice(0, 50).reduce((sum, [price, size]) => sum + (parseFloat(price) * parseFloat(size)), 0);
    const askLiquidity = asks.slice(0, 50).reduce((sum, [price, size]) => sum + (parseFloat(price) * parseFloat(size)), 0);

    document.getElementById('bid-liquidity').textContent = `$${(bidLiquidity / 1000000).toFixed(1)}M`;
    document.getElementById('ask-liquidity').textContent = `$${(askLiquidity / 1000000).toFixed(1)}M`;
  }

  // Initialize
  const data = await fetchOrderBookData();
  renderOrderBook(data);

  // Update every 5 seconds (order book changes fast)
  setInterval(async () => {
    const data = await fetchOrderBookData();
    renderOrderBook(data);
  }, 5000);
}

// Auto-init when loaded
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initOrderBookHeatmap);
} else {
  initOrderBookHeatmap();
}
</script>
