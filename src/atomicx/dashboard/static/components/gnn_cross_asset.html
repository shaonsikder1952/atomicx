<script>
// GNN CROSS-ASSET - REAL DATA
async function initGNNCrossAsset() {
  // Fetch REAL GNN data
  async function fetchGNNData() {
    try {
      const response = await fetch('/api/god_mode/predictions?symbol=BTC/USDT');
      const data = await response.json();

      const gnn = data.predictions?.gnn;

      if (gnn && gnn.data_source === 'REAL') {
        return {
          direction: gnn.direction || 'neutral',
          confidence: gnn.confidence || 0.5,
          influenced_by: gnn.influenced_by || {},
          cross_asset_signals: gnn.cross_asset_signals || {},
          graph_density: gnn.graph_density || 0.5,
          avg_influence: gnn.avg_influence || 0.3,
          coherence: gnn.coherence || 0.7,
          source: 'REAL'
        };
      }

      return null;

    } catch (error) {
      console.error('Error fetching GNN data:', error);
      return null;
    }
  }

  // Render GNN visualization
  function renderGNN(data) {
    if (!data) {
      document.querySelector('.target-asset').innerHTML =
        '<div style="text-align: center; color: var(--text-muted); padding: var(--space-lg);">GNN data unavailable</div>';
      return;
    }

    // Update target prediction
    const directionEl = document.getElementById('gnn-direction');
    directionEl.className = `prediction-direction ${data.direction}`;

    const directionText = directionEl.querySelector('.direction-text');
    directionText.textContent = data.direction.toUpperCase();

    const directionIcon = directionEl.querySelector('.direction-icon');
    directionIcon.textContent = data.direction === 'bullish' ? '📈' :
                                 data.direction === 'bearish' ? '📉' : '➡️';

    const confidencePct = Math.round(data.confidence * 100);
    document.getElementById('gnn-confidence-bar').style.width = `${confidencePct}%`;
    document.getElementById('gnn-confidence-value').textContent = `${confidencePct}%`;

    // Render influence sources
    const influenceGrid = document.getElementById('influence-grid');
    influenceGrid.innerHTML = '';

    const influencedBy = data.influenced_by;
    if (influencedBy && Object.keys(influencedBy).length > 0) {
      // Sort by influence strength
      const sorted = Object.entries(influencedBy).sort((a, b) => b[1] - a[1]);

      sorted.slice(0, 5).forEach(([asset, strength], index) => {
        const item = document.createElement('div');
        item.className = 'influence-item';
        item.innerHTML = `
          <span class="influence-rank">#${index + 1}</span>
          <span class="influence-asset">${asset}</span>
          <div class="influence-strength">
            <div class="influence-bar-wrapper">
              <div class="influence-bar" style="width: ${strength * 100}%"></div>
            </div>
            <span class="influence-value">${(strength * 100).toFixed(0)}%</span>
          </div>
        `;
        influenceGrid.appendChild(item);
      });
    } else {
      influenceGrid.innerHTML = '<div style="color: var(--text-muted); text-align: center; padding: var(--space-sm);">No influence data available</div>';
    }

    // Render cross-asset signals
    const signalsGrid = document.getElementById('signals-grid');
    signalsGrid.innerHTML = '';

    const signals = data.cross_asset_signals;
    if (signals && Object.keys(signals).length > 0) {
      // Count directions
      let bullish = 0, neutral = 0, bearish = 0;

      Object.entries(signals).forEach(([asset, direction]) => {
        if (direction === 'bullish') bullish++;
        else if (direction === 'bearish') bearish++;
        else neutral++;

        const card = document.createElement('div');
        card.className = 'signal-card';
        card.innerHTML = `
          <span class="signal-asset">${asset}</span>
          <span class="signal-direction ${direction}">${direction.toUpperCase()}</span>
        `;
        signalsGrid.appendChild(card);
      });

      // Update summary
      document.getElementById('signals-summary').textContent =
        `${bullish} Bullish • ${neutral} Neutral • ${bearish} Bearish`;

      // Update asset count
      document.getElementById('gnn-assets').textContent = `${Object.keys(signals).length} Assets`;
    } else {
      signalsGrid.innerHTML = '<div style="grid-column: 1/-1; color: var(--text-muted); text-align: center; padding: var(--space-sm);">No signals available</div>';
    }

    // Update graph metrics
    document.getElementById('graph-density').textContent = data.graph_density.toFixed(2);
    document.getElementById('avg-influence').textContent = data.avg_influence.toFixed(2);
    document.getElementById('coherence').textContent = data.coherence.toFixed(2);

    // Estimate edge count (rough approximation)
    const assetCount = Object.keys(signals).length || 8;
    const edgeCount = Math.round(assetCount * (assetCount - 1) / 2 * data.graph_density);
    document.getElementById('gnn-edges').textContent = `${edgeCount} Edges`;
  }

  // Initialize
  const data = await fetchGNNData();
  renderGNN(data);

  // Update every 30 seconds
  setInterval(async () => {
    const data = await fetchGNNData();
    renderGNN(data);
  }, 30000);
}

// Auto-init when loaded
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initGNNCrossAsset);
} else {
  initGNNCrossAsset();
}
</script>
