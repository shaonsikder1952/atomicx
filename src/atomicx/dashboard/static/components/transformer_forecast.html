<script>
// TRANSFORMER FORECAST - REAL DATA
let forecastData = null;
let activeHorizon = '24h';

async function initTransformerForecast() {
  // Fetch REAL transformer predictions
  async function fetchTransformerData() {
    try {
      const response = await fetch('/api/god_mode/predictions?symbol=BTC/USDT');
      const data = await response.json();

      const transformer = data.predictions?.transformer;

      if (transformer && transformer.data_source === 'REAL') {
        return {
          horizons: transformer.horizons || {},
          attention_focus: transformer.attention_focus || 'N/A',
          key_features: transformer.key_features || [],
          source: 'REAL'
        };
      }

      return null;

    } catch (error) {
      console.error('Error fetching transformer data:', error);
      return null;
    }
  }

  // Render transformer forecast
  function renderTransformerForecast(data) {
    if (!data || !data.horizons || Object.keys(data.horizons).length === 0) {
      document.querySelector('.horizons-summary').innerHTML =
        '<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: var(--space-lg);">Transformer forecast unavailable</div>';
      return;
    }

    forecastData = data;

    // Render all horizon summary cards
    const horizonKeys = ['1h', '4h', '24h', '1w'];
    const horizonMap = {
      '1h': data.horizons['1h'] || data.horizons[1],
      '4h': data.horizons['4h'] || data.horizons[4],
      '24h': data.horizons['24h'] || data.horizons[24],
      '1w': data.horizons['1w'] || data.horizons[168]
    };

    horizonKeys.forEach(key => {
      const horizon = horizonMap[key];
      const card = document.getElementById(`horizon-${key}`);

      if (!horizon || !card) return;

      const prediction = horizon.predicted_change || 0;
      const confidence = horizon.confidence || 0.5;
      const direction = horizon.direction || 'neutral';

      // Update summary card
      const predictionEl = card.querySelector('.summary-prediction');
      predictionEl.textContent = `${prediction >= 0 ? '+' : ''}${(prediction * 100).toFixed(1)}%`;
      predictionEl.className = `summary-prediction ${prediction >= 0 ? 'positive' : 'negative'}`;

      const directionIcon = card.querySelector('.summary-direction');
      directionIcon.textContent = direction === 'bullish' ? '📈' : direction === 'bearish' ? '📉' : '➡️';
      directionIcon.className = `summary-direction ${direction}`;

      const confidenceBar = card.querySelector('.summary-confidence-bar');
      confidenceBar.style.width = `${confidence * 100}%`;

      // Mark active
      if (key === activeHorizon) {
        card.classList.add('active');
      } else {
        card.classList.remove('active');
      }
    });

    // Update active horizon display
    updateActiveHorizonDisplay(activeHorizon);

    // Update attention info
    document.getElementById('attention-focus').textContent = data.attention_focus || 'N/A';
    document.getElementById('key-features').textContent = data.key_features.length > 0 ?
      data.key_features.join(', ') : 'N/A';
  }

  // Update active horizon display
  function updateActiveHorizonDisplay(horizonKey) {
    if (!forecastData) return;

    const horizonMap = {
      '1h': forecastData.horizons['1h'] || forecastData.horizons[1],
      '4h': forecastData.horizons['4h'] || forecastData.horizons[4],
      '24h': forecastData.horizons['24h'] || forecastData.horizons[24],
      '1w': forecastData.horizons['1w'] || forecastData.horizons[168]
    };

    const horizon = horizonMap[horizonKey];
    if (!horizon) return;

    const prediction = horizon.predicted_change || 0;
    const confidence = horizon.confidence || 0.5;
    const targetPrice = horizon.target_price || 0;

    // Update prediction display
    const predictionEl = document.getElementById('horizon-prediction');
    predictionEl.textContent = `${prediction >= 0 ? '+' : ''}${(prediction * 100).toFixed(1)}%`;
    predictionEl.className = `prediction-value ${prediction >= 0 ? 'positive' : 'negative'}`;

    document.getElementById('horizon-target').textContent = targetPrice > 0 ?
      `→ $${targetPrice.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}` : '';

    // Update confidence
    const confidencePct = Math.round(confidence * 100);
    document.getElementById('horizon-confidence-bar').style.width = `${confidencePct}%`;
    document.getElementById('horizon-confidence-value').textContent = `${confidencePct}%`;
  }

  // Initialize
  const data = await fetchTransformerData();
  renderTransformerForecast(data);

  // Update every 30 seconds
  setInterval(async () => {
    const data = await fetchTransformerData();
    renderTransformerForecast(data);
  }, 30000);
}

// Switch horizon (called by buttons)
window.switchHorizon = function(horizonKey) {
  activeHorizon = horizonKey;

  // Update tab states
  document.querySelectorAll('.horizon-tab').forEach(tab => {
    if (tab.dataset.horizon === horizonKey) {
      tab.classList.add('active');
    } else {
      tab.classList.remove('active');
    }
  });

  // Update summary card states
  document.querySelectorAll('.summary-card').forEach(card => {
    if (card.id === `horizon-${horizonKey}`) {
      card.classList.add('active');
    } else {
      card.classList.remove('active');
    }
  });

  // Update active display
  if (forecastData) {
    const horizonMap = {
      '1h': forecastData.horizons['1h'] || forecastData.horizons[1],
      '4h': forecastData.horizons['4h'] || forecastData.horizons[4],
      '24h': forecastData.horizons['24h'] || forecastData.horizons[24],
      '1w': forecastData.horizons['1w'] || forecastData.horizons[168]
    };

    const horizon = horizonMap[horizonKey];
    if (!horizon) return;

    const prediction = horizon.predicted_change || 0;
    const confidence = horizon.confidence || 0.5;
    const targetPrice = horizon.target_price || 0;

    const predictionEl = document.getElementById('horizon-prediction');
    predictionEl.textContent = `${prediction >= 0 ? '+' : ''}${(prediction * 100).toFixed(1)}%`;
    predictionEl.className = `prediction-value ${prediction >= 0 ? 'positive' : 'negative'}`;

    document.getElementById('horizon-target').textContent = targetPrice > 0 ?
      `→ $${targetPrice.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}` : '';

    const confidencePct = Math.round(confidence * 100);
    document.getElementById('horizon-confidence-bar').style.width = `${confidencePct}%`;
    document.getElementById('horizon-confidence-value').textContent = `${confidencePct}%`;
  }
};

// Auto-init when loaded
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initTransformerForecast);
} else {
  initTransformerForecast();
}
</script>
