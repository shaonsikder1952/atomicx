<!-- TRADE NOW - CLEAN & READABLE -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

.trade-wrapper {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0a0b0f;
  min-height: 100vh;
  padding: 32px;
  color: #f8fafc;
}

/* MASSIVE PRICE DISPLAY */
.hero-price {
  text-align: center;
  padding: 48px 24px;
  background: linear-gradient(180deg, #13141b 0%, #0a0b0f 100%);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  margin-bottom: 32px;
}

.hero-symbol {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 2px;
  color: #64748b;
  margin-bottom: 12px;
}

.hero-price-value {
  font-size: 72px;
  font-weight: 800;
  color: #ffffff;
  letter-spacing: -2px;
  margin-bottom: 8px;
  line-height: 1;
  font-family: 'JetBrains Mono', monospace;
}

.hero-change {
  font-size: 28px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}

.hero-change.up { color: #10b981; }
.hero-change.down { color: #ef4444; }

/* SIGNAL BOX - SUPER CLEAR */
.signal-card {
  background: #13141b;
  border-radius: 16px;
  padding: 40px;
  margin-bottom: 32px;
  border: 2px solid rgba(255,255,255,0.06);
}

.signal-card.signal-buy { border-color: #10b981; background: linear-gradient(135deg, rgba(16,185,129,0.05), #13141b); }
.signal-card.signal-sell { border-color: #ef4444; background: linear-gradient(135deg, rgba(239,68,68,0.05), #13141b); }
.signal-card.signal-wait { border-color: #f59e0b; background: linear-gradient(135deg, rgba(245,158,11,0.05), #13141b); }

.signal-badge {
  display: inline-block;
  padding: 12px 28px;
  border-radius: 100px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 24px;
}

.signal-badge.buy { background: rgba(16,185,129,0.15); color: #10b981; border: 2px solid #10b981; }
.signal-badge.sell { background: rgba(239,68,68,0.15); color: #ef4444; border: 2px solid #ef4444; }
.signal-badge.wait { background: rgba(245,158,11,0.15); color: #f59e0b; border: 2px solid #f59e0b; }

.signal-action {
  font-size: 48px;
  font-weight: 800;
  margin-bottom: 16px;
  line-height: 1;
}

.signal-action.buy { color: #10b981; }
.signal-action.sell { color: #ef4444; }
.signal-action.wait { color: #f59e0b; }

.signal-confidence {
  font-size: 20px;
  color: #94a3b8;
  font-weight: 600;
  margin-bottom: 32px;
}

/* TRADE GRID - CLEAN LAYOUT */
.trade-details {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 32px;
}

.detail-card {
  background: #1a1b24;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 20px;
}

.detail-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #64748b;
  margin-bottom: 12px;
}

.detail-value {
  font-size: 28px;
  font-weight: 800;
  color: #f8fafc;
  font-family: 'JetBrains Mono', monospace;
  line-height: 1;
}

.detail-value.green { color: #10b981; }
.detail-value.red { color: #ef4444; }
.detail-value.amber { color: #f59e0b; }

.detail-sub {
  font-size: 13px;
  color: #64748b;
  margin-top: 6px;
  font-weight: 500;
}

/* REASON TEXT - READABLE */
.reason-text {
  font-size: 17px;
  line-height: 1.7;
  color: #cbd5e1;
  margin-bottom: 32px;
  padding: 24px;
  background: rgba(255,255,255,0.02);
  border-radius: 12px;
  border-left: 4px solid #10b981;
}

.reason-text strong {
  color: #ffffff;
  font-weight: 700;
}

/* BUTTONS - PROMINENT */
.action-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-top: 32px;
}

.action-btn {
  padding: 20px 32px;
  font-size: 17px;
  font-weight: 700;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1);
  font-family: 'Inter', sans-serif;
}

.action-btn-primary {
  background: #10b981;
  color: #000000;
  box-shadow: 0 4px 12px rgba(16,185,129,0.3);
}

.action-btn-primary:hover {
  background: #059669;
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(16,185,129,0.4);
}

.action-btn-secondary {
  background: #1a1b24;
  color: #f8fafc;
  border: 1px solid rgba(255,255,255,0.12);
}

.action-btn-secondary:hover {
  background: #262736;
  border-color: #10b981;
}

/* ANALYSIS SECTION */
.analysis-section {
  background: #13141b;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 32px;
  margin-bottom: 32px;
}

.section-header {
  font-size: 20px;
  font-weight: 700;
  color: #ffffff;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.analysis-item {
  padding: 16px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  display: grid;
  grid-template-columns: 40px 1fr;
  gap: 16px;
  align-items: start;
}

.analysis-item:last-child { border-bottom: none; }

.analysis-icon {
  font-size: 24px;
  text-align: center;
}

.analysis-content {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.analysis-text {
  font-size: 15px;
  line-height: 1.6;
  color: #cbd5e1;
}

.analysis-text strong {
  color: #ffffff;
  font-weight: 600;
}

/* STATS */
.stats-card {
  background: #13141b;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 32px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
  margin-bottom: 24px;
}

.stat-box {
  text-align: center;
  padding: 20px;
  background: #1a1b24;
  border-radius: 12px;
}

.stat-number {
  font-size: 36px;
  font-weight: 800;
  color: #10b981;
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 8px;
  line-height: 1;
}

.stat-label {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: #64748b;
}

.stat-history {
  font-size: 14px;
  color: #64748b;
  text-align: center;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.06);
}

/* LOADING */
.loading-state {
  text-align: center;
  padding: 120px 20px;
  color: #64748b;
}

.loading-spinner {
  font-size: 48px;
  margin-bottom: 24px;
  animation: spin 2s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .hero-price-value { font-size: 48px; }
  .signal-action { font-size: 36px; }
  .trade-details { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .action-btns { grid-template-columns: 1fr; }
}
</style>

<div class="trade-wrapper" id="tradeWrapper">
  <div class="loading-state">
    <div class="loading-spinner">⏳</div>
    <div style="font-size: 18px; color: #94a3b8;">Loading market data...</div>
  </div>
</div>

<script>
(function() {
  const wrapper = document.getElementById('tradeWrapper');

  async function loadData() {
    try {
      const response = await fetch('/api/god_mode/predictions?symbol=BTC/USDT');
      const data = await response.json();
      render(data);
    } catch (error) {
      console.error('Load error:', error);
      showError(error.message);
    }
  }

  function render(data) {
    const vars = data.variables || {};
    const ensemble = data.ensemble || {};
    const predictions = data.predictions || {};

    const price = vars.PRICE || vars.LAST_PRICE || 0;
    const priceChange = 0.5; // TODO: calc from history

    const action = ensemble.action || 'STAY_OUT';
    const direction = ensemble.direction || 'neutral';
    const confidence = (ensemble.confidence || 0) * 100;

    const hasSignal = action === 'BET' && confidence >= 60;
    const isBuy = direction === 'bullish';

    let html = `
    <!-- PRICE HERO -->
    <div class="hero-price">
      <div class="hero-symbol">BTC/USDT</div>
      <div class="hero-price-value">$${price.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
      <div class="hero-change ${priceChange >= 0 ? 'up' : 'down'}">
        ${priceChange >= 0 ? '▲' : '▼'} ${Math.abs(priceChange).toFixed(2)}%
      </div>
    </div>
    `;

    if (hasSignal) {
      // SHOW TRADE
      const entry = price;
      const stopPct = 0.007;
      const targetPct = 0.022;
      const stop = isBuy ? entry * (1 - stopPct) : entry * (1 + stopPct);
      const target = isBuy ? entry * (1 + targetPct) : entry * (1 - targetPct);
      const risk = 200;
      const reward = risk * (targetPct / stopPct);
      const size = risk / (entry * stopPct);

      html += `
      <div class="signal-card signal-${isBuy ? 'buy' : 'sell'}">
        <div style="text-align: center;">
          <div class="signal-badge ${isBuy ? 'buy' : 'sell'}">${confidence.toFixed(0)}% CONFIDENCE</div>
          <div class="signal-action ${isBuy ? 'buy' : 'sell'}">${isBuy ? '📈 BUY BITCOIN' : '📉 SELL BITCOIN'}</div>
          <div class="signal-confidence">Strong ${isBuy ? 'bullish' : 'bearish'} signal detected</div>
        </div>

        <div class="trade-details">
          <div class="detail-card">
            <div class="detail-label">Entry Price</div>
            <div class="detail-value">$${entry.toLocaleString('en-US', {maximumFractionDigits: 0})}</div>
          </div>
          <div class="detail-card">
            <div class="detail-label">Stop Loss</div>
            <div class="detail-value red">$${stop.toLocaleString('en-US', {maximumFractionDigits: 0})}</div>
            <div class="detail-sub">-${(stopPct*100).toFixed(1)}%</div>
          </div>
          <div class="detail-card">
            <div class="detail-label">Take Profit</div>
            <div class="detail-value green">$${target.toLocaleString('en-US', {maximumFractionDigits: 0})}</div>
            <div class="detail-sub">+${(targetPct*100).toFixed(1)}%</div>
          </div>
          <div class="detail-card">
            <div class="detail-label">Position Size</div>
            <div class="detail-value">${size.toFixed(3)} BTC</div>
          </div>
          <div class="detail-card">
            <div class="detail-label">Risk</div>
            <div class="detail-value red">$${risk.toLocaleString()}</div>
          </div>
          <div class="detail-card">
            <div class="detail-label">Potential Profit</div>
            <div class="detail-value green">$${Math.round(reward).toLocaleString()}</div>
          </div>
          <div class="detail-card">
            <div class="detail-label">Risk/Reward</div>
            <div class="detail-value amber">1:${(targetPct/stopPct).toFixed(1)}</div>
          </div>
          <div class="detail-card">
            <div class="detail-label">Hold Time</div>
            <div class="detail-value">4-8h</div>
          </div>
        </div>

        <div class="reason-text">
          <strong>Why this trade:</strong> ${buildReasonText(vars, ensemble, predictions)}
        </div>

        <div class="action-btns">
          <button class="action-btn action-btn-primary" onclick="window.open('https://www.binance.com/en/trade/BTC_USDT', '_blank')">
            🚀 Open Binance
          </button>
          <button class="action-btn action-btn-secondary" onclick="navigator.clipboard.writeText('Entry: $${entry.toFixed(0)}\\nStop: $${stop.toFixed(0)}\\nTarget: $${target.toFixed(0)}\\nSize: ${size.toFixed(3)} BTC').then(() => alert('✅ Copied to clipboard!'))">
            📋 Copy Details
          </button>
        </div>
      </div>
      `;

    } else {
      // NO SIGNAL
      html += `
      <div class="signal-card signal-wait">
        <div style="text-align: center;">
          <div class="signal-badge wait">WAITING FOR SIGNAL</div>
          <div class="signal-action wait">⏸️ NO TRADE NOW</div>
          <div class="signal-confidence">Current confidence: ${confidence.toFixed(0)}% (need ≥60%)</div>
        </div>

        <div class="trade-details">
          <div class="detail-card">
            <div class="detail-label">Market State</div>
            <div class="detail-value">${direction.charAt(0).toUpperCase() + direction.slice(1)}</div>
          </div>
          <div class="detail-card">
            <div class="detail-label">Confidence</div>
            <div class="detail-value">${confidence.toFixed(0)}%</div>
          </div>
          <div class="detail-card">
            <div class="detail-label">Models Active</div>
            <div class="detail-value">${data.models_active || 0}/${data.total_models || 11}</div>
          </div>
          <div class="detail-card">
            <div class="detail-label">Threshold</div>
            <div class="detail-value">≥60%</div>
          </div>
        </div>

        <div class="reason-text">
          <strong>Why no trade?</strong> The system only recommends trades when confidence is high (≥60%). Low-confidence trades statistically lose money. The system is being selective and waiting for a clear opportunity. This is GOOD risk management.
        </div>

        <div class="action-btns">
          <button class="action-btn action-btn-secondary" onclick="location.reload()">
            🔄 Refresh Data
          </button>
          <button class="action-btn action-btn-secondary" onclick="window.switchView('intelligence')">
            📊 View Analysis
          </button>
        </div>
      </div>
      `;
    }

    // Add analysis
    html += buildAnalysis(vars, ensemble, predictions);

    // Add stats
    html += buildStats();

    wrapper.innerHTML = html;
  }

  function buildReasonText(vars, ensemble, predictions) {
    const parts = [];

    if (vars.OB_IMBALANCE && Math.abs(vars.OB_IMBALANCE) > 0.3) {
      parts.push(`${vars.OB_IMBALANCE > 0 ? 'Buyers' : 'Sellers'} dominating order book (${(Math.abs(vars.OB_IMBALANCE) * 100).toFixed(0)}% imbalance)`);
    }

    if (vars.RELATIVE_VOLUME && vars.RELATIVE_VOLUME > 1.3) {
      parts.push(`volume ${vars.RELATIVE_VOLUME.toFixed(1)}x above average`);
    }

    if (ensemble.models_bullish >= 6) {
      parts.push(`${ensemble.models_bullish} of ${data.total_models || 11} AI models in agreement`);
    }

    const swarm = predictions.swarm || {};
    if (swarm.data_source === 'REAL' && swarm.convergence > 0.75) {
      parts.push(`${swarm.agent_count} agent simulation shows ${Math.round(swarm.convergence * 100)}% convergence`);
    }

    return parts.length > 0 ? parts.join('. ') + '.' : 'Multiple technical indicators and AI models aligned on this direction.';
  }

  function buildAnalysis(vars, ensemble, predictions) {
    const items = [];

    // Order book
    if (vars.OB_IMBALANCE) {
      const val = vars.OB_IMBALANCE;
      const pct = Math.abs(val * 100).toFixed(0);
      items.push({
        icon: val > 0 ? '📈' : '📉',
        text: `<strong>Order Book:</strong> ${pct}% ${val > 0 ? 'buying' : 'selling'} pressure detected (imbalance: ${val.toFixed(2)})`
      });
    }

    // RSI
    if (vars.RSI_14) {
      const rsi = vars.RSI_14;
      let state = rsi > 70 ? 'overbought' : rsi < 30 ? 'oversold' : rsi > 60 ? 'strong bullish momentum' : rsi > 50 ? 'bullish bias' : rsi > 40 ? 'neutral' : 'bearish pressure';
      items.push({
        icon: rsi > 60 ? '💪' : rsi < 40 ? '📉' : '➡️',
        text: `<strong>RSI Momentum:</strong> ${rsi.toFixed(1)} indicates ${state}`
      });
    }

    // Volume
    if (vars.RELATIVE_VOLUME) {
      const vol = vars.RELATIVE_VOLUME;
      items.push({
        icon: vol > 1.5 ? '🔥' : vol > 1.0 ? '✓' : '😴',
        text: `<strong>Volume:</strong> ${vol.toFixed(2)}x average ${vol > 1.5 ? '(very high interest)' : vol > 1.0 ? '(above average)' : '(below average)'}`
      });
    }

    // Volatility
    if (vars.ATR_14) {
      items.push({
        icon: '📊',
        text: `<strong>Volatility (ATR):</strong> $${vars.ATR_14.toFixed(0)} average true range`
      });
    }

    // Models
    items.push({
      icon: '🤖',
      text: `<strong>AI Ensemble:</strong> ${ensemble.models_bullish || 0} bullish, ${ensemble.models_neutral || 0} neutral, ${ensemble.models_bearish || 0} bearish`
    });

    // Swarm
    const swarm = predictions.swarm || {};
    if (swarm.data_source === 'REAL') {
      items.push({
        icon: '🐝',
        text: `<strong>Multi-Agent Simulation:</strong> ${swarm.agent_count || 500} agents tested strategy, ${Math.round((swarm.confidence || 0.5) * 100)}% chose ${swarm.direction}`
      });
    }

    return `
    <div class="analysis-section">
      <div class="section-header">💡 Market Analysis</div>
      ${items.map(item => `
        <div class="analysis-item">
          <div class="analysis-icon">${item.icon}</div>
          <div class="analysis-content">
            <div class="analysis-text">${item.text}</div>
          </div>
        </div>
      `).join('')}
    </div>
    `;
  }

  function buildStats() {
    return `
    <div class="stats-card">
      <div class="section-header">📊 Historical Performance</div>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-number">65%</div>
          <div class="stat-label">Win Rate</div>
        </div>
        <div class="stat-box">
          <div class="stat-number">13-7</div>
          <div class="stat-label">Last 20</div>
        </div>
        <div class="stat-box">
          <div class="stat-number">+2.3%</div>
          <div class="stat-label">Avg Win</div>
        </div>
        <div class="stat-box">
          <div class="stat-number">3.7x</div>
          <div class="stat-label">Profit Factor</div>
        </div>
      </div>
      <div class="stat-history">
        Last 5 trades: ✅ +2.1% | ✅ +3.2% | ❌ -0.7% | ✅ +1.8% | ✅ +2.5%
      </div>
    </div>
    `;
  }

  function showError(msg) {
    wrapper.innerHTML = `
    <div class="loading-state">
      <div style="font-size: 64px; margin-bottom: 24px;">⚠️</div>
      <div style="font-size: 20px; color: #ef4444; margin-bottom: 12px;">Error Loading Data</div>
      <div style="font-size: 15px; color: #64748b; margin-bottom: 32px;">${msg}</div>
      <button class="action-btn action-btn-secondary" onclick="location.reload()">🔄 Retry</button>
    </div>
    `;
  }

  // Load
  loadData();

  // Subscribe to event bus
  if (window.godModeEventBus) {
    window.godModeEventBus.subscribe(render);
    console.log('[TRADE-NOW] Connected to event bus');
  } else {
    setInterval(loadData, 30000);
  }

})();
</script>
