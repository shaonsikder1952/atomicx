<script>
// ENSEMBLE VOTING - REAL DATA
async function initEnsembleVoting() {
  // Fetch REAL ensemble predictions
  async function fetchEnsembleData() {
    try {
      const response = await fetch('/api/god_mode/predictions?symbol=BTC/USDT');
      const data = await response.json();

      if (data && data.ensemble && data.predictions) {
        return {
          ensemble: data.ensemble,
          predictions: data.predictions,
          models_active: data.models_active || 0,
          total_models: data.total_models || 11,
          source: 'REAL'
        };
      }

      return null;

    } catch (error) {
      console.error('Error fetching ensemble data:', error);
      return null;
    }
  }

  // Render ensemble voting breakdown
  function renderEnsembleVoting(data) {
    if (!data) {
      // Show unavailable message
      document.getElementById('model-votes-grid').innerHTML =
        '<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: var(--space-lg);">Ensemble data unavailable</div>';
      return;
    }

    const { ensemble, predictions, models_active, total_models } = data;

    // Update header
    document.getElementById('models-active').textContent = `${models_active}/${total_models} Models`;

    // Update agreement level pill
    const agreementPill = document.getElementById('agreement-level');
    const agreement = ensemble.agreement || 0;
    if (agreement >= 0.8) {
      agreementPill.textContent = 'High Agreement';
      agreementPill.style.background = 'rgba(16, 185, 129, 0.1)';
      agreementPill.style.color = 'var(--bullish)';
    } else if (agreement >= 0.6) {
      agreementPill.textContent = 'Moderate Agreement';
      agreementPill.style.background = 'rgba(245, 158, 11, 0.1)';
      agreementPill.style.color = 'var(--warning)';
    } else {
      agreementPill.textContent = 'Low Agreement';
      agreementPill.style.background = 'rgba(239, 68, 68, 0.1)';
      agreementPill.style.color = 'var(--bearish)';
    }

    // Update consensus summary
    const directionEl = document.getElementById('consensus-direction');
    directionEl.className = `consensus-direction ${ensemble.direction || 'neutral'}`;

    const directionText = directionEl.querySelector('.direction-text');
    directionText.textContent = (ensemble.direction || 'neutral').toUpperCase();

    const directionIcon = directionEl.querySelector('.direction-icon');
    directionIcon.textContent = ensemble.direction === 'bullish' ? '📈' :
                                 ensemble.direction === 'bearish' ? '📉' : '➡️';

    // Update confidence bar
    const confidence = Math.round((ensemble.confidence || 0.5) * 100);
    document.getElementById('ensemble-confidence-bar').style.width = `${confidence}%`;
    document.getElementById('ensemble-confidence-value').textContent = `${confidence}%`;

    // Update agreement score
    document.getElementById('agreement-score').textContent = `${Math.round(agreement * 100)}%`;

    // Update vote counts
    document.getElementById('bullish-count').textContent = ensemble.models_bullish || 0;
    document.getElementById('neutral-count').textContent = ensemble.models_neutral || 0;
    document.getElementById('bearish-count').textContent = ensemble.models_bearish || 0;

    // Render model cards
    const grid = document.getElementById('model-votes-grid');
    grid.innerHTML = '';

    const modelOrder = [
      'diffusion',
      'transformer',
      'gnn',
      'swarm',
      'orderbook',
      'metalearning',
      'rl',
      'causal',
      'neurosymbolic',
      'altdata',
      'ensemble_weights'
    ];

    modelOrder.forEach(modelKey => {
      const prediction = predictions[modelKey];

      if (!prediction) {
        // Model not available - show placeholder
        const card = document.createElement('div');
        card.className = 'model-card unavailable';
        card.innerHTML = `
          <div class="model-header">
            <span class="model-name">${modelKey.replace('_', ' ')}</span>
            <span class="model-direction neutral">N/A</span>
          </div>
          <div class="model-confidence">--</div>
          <div class="model-confidence-bar">
            <div class="model-confidence-fill" style="width: 0%"></div>
          </div>
        `;
        grid.appendChild(card);
        return;
      }

      // Model available - show real data
      const direction = prediction.direction || 'neutral';
      const confidencePct = Math.round((prediction.confidence || 0.5) * 100);
      const isReal = prediction.data_source === 'REAL';

      const card = document.createElement('div');
      card.className = `model-card ${!isReal ? 'unavailable' : ''}`;
      card.innerHTML = `
        <div class="model-header">
          <span class="model-name">${prediction.name || modelKey.replace('_', ' ')}</span>
          <span class="model-direction ${direction}">${direction.toUpperCase()}</span>
        </div>
        <div class="model-confidence">${confidencePct}%</div>
        <div class="model-confidence-bar">
          <div class="model-confidence-fill" style="width: ${confidencePct}%"></div>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  // PERFORMANCE FIX: Connect to global event bus instead of independent polling
  // This eliminates the "thundering herd" problem

  if (window.godModeEventBus) {
    // Subscribe to global event bus
    window.godModeEventBus.subscribe((apiData) => {
      if (apiData && apiData.ensemble && apiData.predictions) {
        const data = {
          ensemble: apiData.ensemble,
          predictions: apiData.predictions,
          models_active: apiData.models_active || 0,
          total_models: apiData.total_models || 11,
          source: 'REAL'
        };
        renderEnsembleVoting(data);
      }
    });
    console.log('[ENSEMBLE] Connected to global event bus');
  } else {
    // Fallback: if event bus not available, fetch directly
    console.warn('[ENSEMBLE] Event bus not found, using fallback polling');
    const data = await fetchEnsembleData();
    renderEnsembleVoting(data);

    setInterval(async () => {
      const data = await fetchEnsembleData();
      renderEnsembleVoting(data);
    }, 30000);
  }
}

// Auto-init when loaded
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initEnsembleVoting);
} else {
  initEnsembleVoting();
}
</script>
